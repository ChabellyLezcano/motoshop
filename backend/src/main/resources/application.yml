spring:
  application:
    name: motoshop-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/motoshop}
    username: ${SPRING_DATASOURCE_USERNAME:motoshop}
    password: ${SPRING_DATASOURCE_PASSWORD:motoshop}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway es la unica fuente de verdad del esquema. Hibernate
      # se limita a validar que el mapeo cuadra con las tablas reales.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

# Exposicion de endpoints de gestion. /actuator/prometheus quedara
# disponible para el Sprint 4 (observabilidad).
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

# Configuracion de la propia aplicacion. Todos los valores tienen un
# default razonable de desarrollo pero deben sobreescribirse en
# produccion mediante variables de entorno.
app:
  jwt:
    # IMPORTANTE: en produccion debe sobreescribirse con APP_JWT_SECRET.
    # Para HS256 jjwt exige una clave de al menos 256 bits (32 bytes).
    secret: ${APP_JWT_SECRET:cambia-este-secreto-en-produccion-minimo-32-bytes!}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:60}
    issuer: motoshop-api
  admin:
    # Credenciales del administrador inicial. Si el usuario no existe
    # al arrancar la app, se crea con rol ADMIN. Si existe, no se toca.
    email: ${APP_ADMIN_EMAIL:[email protected]}
    password: ${APP_ADMIN_PASSWORD:changeme-admin}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4300}
# OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    # Persist the JWT across page reloads — convenient during development.
    persist-authorization: true
---
# <-- OJO: Este separador es obligatorio para aislar el bloque de abajo

spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:motoshop-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false