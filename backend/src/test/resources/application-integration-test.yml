# Properties specific to the integration-test profile. Most of the
# datasource is injected dynamically from the Testcontainers Postgres
# (see PostgresIntegrationTest), so we only carry the application-level
# settings here.

app:
  jwt:
    secret: this-is-an-it-only-secret-32bytes-min-bbbbbbbbbbb
    expiration-minutes: 60
    issuer: motoshop-api-it
  admin:
    email: [email protected]
    password: it-admin-pw
  cors:
    allowed-origins: http://localhost:4200

logging:
  level:
    org.testcontainers: INFO
    org.hibernate.SQL: WARN