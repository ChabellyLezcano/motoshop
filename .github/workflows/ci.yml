name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Sanity check on the Docker daemon. Testcontainers tries to talk
      # to it during `mvn verify`; this catches a broken runner before
      # the test phase.
      - name: Verify Docker is available
        run: docker version

      - name: Run unit tests
        working-directory: backend
        run: mvn -B test

      - name: Run integration tests (Testcontainers + Postgres)
        working-directory: backend
        run: mvn -B verify -DskipUnitTests=false

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-failsafe-reports
          path: |
            backend/target/surefire-reports/**
            backend/target/failsafe-reports/**

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Build
        working-directory: frontend
        run: npm run build